<!DOCTYPE html>
<html>
<head>
    <title>🐱 Meowbin.fun</title>
    <meta name="viewport" content="width=device-width">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: linear-gradient(45deg, #000, #111, #000); 
            color: #0f0; 
            min-height: 100vh; 
            text-align: center; 
            overflow-x: hidden;
        }
        .cat { font-size: 8rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-30px);} 60%{transform:translateY(-15px);} }
        h1 { font-size: 3rem; margin: 20px 0; text-shadow: 0 0 20px #0f0; }
        p { font-size: 1.2rem; margin: 10px; }
        .status { background: rgba(0,255,0,0.1); padding: 15px; border: 1px solid #0f0; border-radius: 10px; display: inline-block; }
        .links { margin-top: 30px; }
        .links a { color: #0f0; text-decoration: none; margin: 0 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="cat">🐱</div>
    <h1>Meowbin.fun</h1>
    <div class="status">
        <p>✅ LIVE WORLDWIDE</p>
        <p>🚀 GitHub Pages + Cloudflare</p>
        <p>💰 100% FREE FOREVER</p>
    </div>
    <div class="links">
        <a href="/admin">/admin</a>
        <a href="/api">/api</a>
        <a href="/login">/login</a>
    </div>
</body>
</html>
